site_name: polymarket-go
site_description: Go SDK for building AI trading agents on Polymarket prediction markets
site_url: https://grokify.github.io/polymarket-go
repo_url: https://github.com/grokify/polymarket-go
repo_name: grokify/polymarket-go

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - CLI Usage: getting-started/cli.md
  - Design:
      - Technical Requirements: design/TRD.md
      - Component Integration: design/COMPONENTS.md
  - Agents:
      - Overview: agents/index.md
      - Market Analyst: agents/market-analyst.md
      - Superforecaster: agents/superforecaster.md
      - Trader: agents/trader.md
      - Team Configuration: agents/team.md
  - API Reference:
      - Polymarket Client: api/polymarket.md
      - Workflow Executor: api/executor.md
      - Spec Loader: api/loader.md
  - Releases:
      - Changelog: releases/CHANGELOG.md
      - v0.1.0: releases/v0.1.0.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/grokify/polymarket-go
